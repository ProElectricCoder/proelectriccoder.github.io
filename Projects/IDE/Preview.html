<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DeepBlue OG Image Generator - Ultra Minimalist</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 1200x630 OPEN GRAPH CANVAS --- */
        .og-canvas {
            width: 1200px;
            height: 630px;
            background: #010409; 
            color: #ffffff;
            display: flex;
            flex-direction: column;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid #2a3241;
            box-sizing: border-box;
        }

        /* --- SKELETON LINE BASE --- */
        .sl {
            display: inline-block;
            border-radius: 100px;
            background: currentColor;
            flex-shrink: 0;
        }

        svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* --- TOP HEADER --- */
        .header {
            height: 56px;
            background: #0a0e14;
            border-bottom: 1px solid #2a3241;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        /* Updated: Logo dot and title line now share same height, dot width matches height */
        .header-logo-dot { width: 16px; height: 16px; background: #00e5ff; border-radius: 50%; box-shadow: 0 0 10px rgba(0, 229, 255, 0.4); flex-shrink: 0; }
        .header-left .sl { width: 140px; height: 16px; background: #00e5ff; opacity: 0.9; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Dots used only in Sidebar, Header Icons, and Console */
        .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .dot.folder { background: #9aa2b1; }
        .dot.html { background: #e34f26; }
        .dot.svg { background: #ffb13b; }
        .dot.py { background: #3776ab; }
        .dot.json { background: #cbcb41; }
        .dot.img { background: #a074c4; }
        .dot.js { background: #f7df1e; }
        .dot.css { background: #264de4; }
        .dot.generic { background: #9aa2b1; opacity: 0.6; }

        .sk-btn {
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            background: #181e27;
            border: 1px solid #2a3241;
        }
        
        .sk-btn .sl { height: 8px; width: 40px; background: #d8dee9; }
        .sk-btn.ai { background: rgba(168, 85, 247, 0.15); border: 1px solid rgba(168, 85, 247, 0.3); }
        .sk-btn.ai .sl { width: 24px; background: #c084fc; }
        .sk-btn.run { background: #4facfe; border: 1px solid #4facfe; }
        .sk-btn.run .sl { width: 32px; background: #000000; opacity: 0.7; }

        /* --- WORKSPACE --- */
        .workspace {
            display: flex;
            flex: 1;
            padding: 16px;
            gap: 16px;
            height: calc(100% - 56px);
            box-sizing: border-box;
        }

        .panel {
            background: #0a0e14;
            border: 1px solid #2a3241;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .panel-tabs {
            height: 44px;
            background: #181e27;
            border-bottom: 1px solid #2a3241;
            display: flex;
            align-items: center;
            padding-right: 12px;
        }

        .tab {
            padding: 0 24px;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            border-right: 1px solid #2a3241;
            background: #181e27;
            border-top: 2px solid transparent;
        }
        
        .tab.active {
            background: #0a0e14;
            border-top: 2px solid #4facfe;
        }

        .tab .sl { height: 8px; width: 75px; background: #9aa2b1; }
        .tab.active .sl { background: #ffffff; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 240px;
            flex-shrink: 0;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            padding: 16px 10px;
            gap: 4px;
            flex: 1;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
        }

        .file-item.child { padding-left: 28px; }
        .file-item .sl { height: 8px; background: #9aa2b1; }
        .file-item.active { background: rgba(79, 172, 254, 0.15); }
        .file-item.active .sl { background: #ffffff; }

        /* --- EDITOR --- */
        .editor-col {
            flex: 1.1;
            display: flex;
            flex-direction: column;
        }

        .editor-body {
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .line { display: flex; align-items: center; gap: 16px; padding: 0 20px; }
        .num-sl { width: 14px; height: 6px; background: #2a3241; border-radius: 3px; }
        .code-wrap { display: flex; align-items: center; gap: 8px; flex: 1; }
        .code-wrap .sl { height: 10px; }
        
        .indent-1 { padding-left: 24px; }
        .indent-2 { padding-left: 48px; }
        .indent-3 { padding-left: 72px; }

        /* Cobalt Syntax Highlighting */
        .tag { background: #9effff !important; }
        .attr { background: #ff80e1 !important; }
        .str { background: #3ad900 !important; }
        .text { background: #ffffff !important; }
        .fg { background: #9aa2b1 !important; }

        /* --- RIGHT COLUMN --- */
        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .preview-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .preview-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .preview-controls .dot { width: 6px; height: 6px; }

        .preview-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #010409;
        }

        .preview-card {
            background: #0a0e14;
            border: 1px solid #2a3241;
            border-radius: 12px;
            padding: 36px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .preview-card svg {
            width: 48px;
            height: 48px;
            stroke: #4facfe;
            opacity: 0.9;
        }

        .sk-line {
            border-radius: 8px;
            background: rgba(0, 229, 255, 0.4);
            flex-shrink: 0;
        }
        .sk-line.sk-heading { background: #fff !important; }

        .sk-title { width: 160px; height: 16px; }
        .sk-subtitle { width: 100px; height: 10px; }

        /* Console Section */
        .console-section {
            height: 150px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-top: 1px solid #2a3241;
            background: #0a0e14;
        }

        .console-logs {
            flex: 1;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
        }

        .log-line { display: flex; align-items: center; gap: 10px; }
        .log-line.error .dot { background: #f87171; box-shadow: 0 0 8px #f87171; }
        .log-line.error .sl { background: #f87171; width: 60%; height: 8px; opacity: 0.8; }
        
        .log-line.warn .dot { background: #facc15; }
        .log-line.warn .sl { background: #facc15; width: 75%; height: 8px; opacity: 0.8; }
        
        .log-line.info .dot { background: #38bdf8; }
        .log-line.info .sl { background: #38bdf8; width: 45%; height: 8px; opacity: 0.8; }

        .console-input {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: #4facfe;
            font-family: monospace;
            font-weight: bold;
            border-top: 1px solid #2a3241;
            background: #181e27;
        }
        .console-input .sl { width: 180px; height: 8px; background: #9aa2b1; }

    </style>
</head>
<body>
