<body class="text-gray-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <!-- Message Modal/Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-xl transform transition-transform duration-300 translate-y-20 opacity-0 z-50">
        <span id="toastMessage">Error message</span>

    <script type="module">
        import { cubicGradient } from 'https://proelectriccoder.github.io/ElectronCSS/CubicGradient.js';

        // Apply ProElectricCoder's signature cubic gradient to the background
        document.body.style.background = cubicGradient({
            direction: 'to bottom right',
            start: '#050510', 
            end: '#003344',   
            steps: 20,
            power: 3
        });

        // Security Warning (Self-XSS Prevention)
        console.log("%cSTOP!", "color: #ef4444; font-family: sans-serif; font-size: 4rem; font-weight: bold; text-shadow: 2px 2px 0px #000;");
        console.log("%cThis is a browser feature intended for developers.\nIf someone told you to copy and paste something here, it is a scam and will give them access to steal your 1024-byte SEP encryption key and decrypted files!", "color: #f3f4f6; font-family: sans-serif; font-size: 1.25rem; font-weight: bold; background: #1f2937; padding: 10px; border-radius: 5px;");

        // DOM Elements
        const fileInput = document.getElementById('fileInput');
        const keyFileInput = document.getElementById('keyFileInput');
        const keyLengthStatus = document.getElementById('keyLengthStatus');
        const genKeyBtn = document.getElementById('genKeyBtn');
        const encryptBtn = document.getElementById('encryptBtn');
        const decryptBtn = document.getElementById('decryptBtn');
        const outputContainer = document.getElementById('outputContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // Constants
        const REQUIRED_KEY_LENGTH = 1024;

        // Utilities
        function showToast(message, isError = true) {
            toastMessage.textContent = message;
            toast.className = `fixed bottom-4 right-4 text-white px-6 py-3 rounded-lg shadow-xl transform transition-all duration-300 z-50 ${isError ? 'bg-red-500' : 'bg-green-500'}`;
            toast.style.transform = 'translateY(0)';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.transform = 'translateY(20px)';
                toast.style.opacity = '0';
            }, 3000);
        }

        // Key encoding/decoding: Packs 2 bytes into 1 UTF-16 character
        function generateUTF16KeyBlob(bytes) {
            // ArrayBuffer for bytes + 2 bytes for the UTF-16LE BOM
            const buffer = new ArrayBuffer(bytes.length + 2);
            const view = new DataView(buffer);
            
            // Add UTF-16LE Byte Order Mark so text editors interpret characters correctly
            view.setUint16(0, 0xFEFF, true);
            
            // Pack every 2 bytes into a single 16-bit character
            for (let i = 0; i < bytes.length; i += 2) {
                const charCode = (bytes[i] << 8) | (bytes[i + 1] || 0);
                view.setUint16(2 + i, charCode, true);
            }
            
            return new Blob([buffer], { type: 'text/plain;charset=UTF-16LE' });
        }

        function parseUTF16KeyBuffer(buffer) {
            const view = new DataView(buffer);
            let startIndex = 0;
            
            // Check for and skip UTF-16LE BOM if present
            if (buffer.byteLength >= 2 && view.getUint16(0, true) === 0xFEFF) {
                startIndex = 2;
            }
            
            const bytes = new Uint8Array(REQUIRED_KEY_LENGTH);
            let byteIdx = 0;
            
            // Unpack each 16-bit character back into 2 bytes
            for (let i = startIndex; i < buffer.byteLength && byteIdx < REQUIRED_KEY_LENGTH; i += 2) {
                const charCode = view.getUint16(i, true);
                bytes[byteIdx++] = (charCode >> 8) & 0xFF;
                bytes[byteIdx++] = charCode & 0xFF;
            }
            return bytes;
        }

        // Key Management
        let currentKeyBytes = null;

        function updateKeyStatus(bytes) {
            currentKeyBytes = bytes;
            if (!bytes) {
                keyLengthStatus.textContent = "Current Key: Not loaded";
                keyLengthStatus.className = "text-xs text-gray-500";
            } else if (bytes.length !== REQUIRED_KEY_LENGTH) {
                keyLengthStatus.textContent = `Invalid Key: ${bytes.length} bytes`;
                keyLengthStatus.className = "text-xs text-red-400";
            } else {
                keyLengthStatus.textContent = `Current Key: Loaded (1024 bytes)`;
                keyLengthStatus.className = "text-xs text-green-400";
            }
        }

        keyFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return updateKeyStatus(null);
            
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const bytes = parseUTF16KeyBuffer(event.target.result);
                    updateKeyStatus(bytes);
                } catch (err) {
                    showToast("Failed to parse key file.");
                }
            };
            reader.readAsArrayBuffer(file);
        });

        genKeyBtn.addEventListener('click', () => {
            const keyBytes = new Uint8Array(REQUIRED_KEY_LENGTH);
            crypto.getRandomValues(keyBytes);
            updateKeyStatus(keyBytes);
            
            const blob = generateUTF16KeyBlob(keyBytes);
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'key.sep';
            a.click();
            URL.revokeObjectURL(url);
            
            showToast("1024-byte key packed to UTF-16 and downloaded.", false);
        });

        // Core Crypto Operation (XOR)
        function processXOR(dataBytes, keyBytes) {
            if (keyBytes.length === 0) throw new Error("Key cannot be empty.");
            const output = new Uint8Array(dataBytes.length);
            for (let i = 0; i < dataBytes.length; i++) {
                output[i] = dataBytes[i] ^ keyBytes[i % keyBytes.length];
            }
            return output;
        }

        // Handle Encryption / Decryption
        function handleFileProcess(mode) {
            const file = fileInput.files[0];

            if (!file) {
                return showToast("Please select an input file first.");
            }
            
            if (!currentKeyBytes || currentKeyBytes.length !== REQUIRED_KEY_LENGTH) {
                return showToast(`Please load a valid ${REQUIRED_KEY_LENGTH}-byte .sep key file.`);
            }
            const keyBytes = currentKeyBytes;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const arrayBuffer = e.target.result;
                    const dataBytes = new Uint8Array(arrayBuffer);
                    let resultBytes;
                    let fileName = file.name;

                    if (mode === 'encrypt') {
                        const lastDotIdx = fileName.lastIndexOf('.');
                        let ext = "";
                        let baseName = fileName;
                        if (lastDotIdx !== -1 && lastDotIdx !== 0) {
                            ext = fileName.substring(lastDotIdx);
                            baseName = fileName.substring(0, lastDotIdx);
                        }

                        const extBytes = new TextEncoder().encode(ext);
                        const extLen = extBytes.length;
                        
                        // Payload format: [S, E, P, 1] [extLen] [extBytes] [originalData]
                        const payload = new Uint8Array(4 + 1 + extLen + dataBytes.length);
                        payload.set([83, 69, 80, 49], 0); // "SEP1" magic header
                        payload[4] = extLen;
                        payload.set(extBytes, 5);
                        payload.set(dataBytes, 5 + extLen);

                        resultBytes = processXOR(payload, keyBytes);
                        fileName = baseName + ".enc";
                    } else if (mode === 'decrypt') {
                        const decryptedPayload = processXOR(dataBytes, keyBytes);
                        
                        // Check for 'SEP1' magic header to see if it contains smart extension metadata
                        const hasMagic = decryptedPayload.length > 4 && 
                            decryptedPayload[0] === 83 && decryptedPayload[1] === 69 && 
                            decryptedPayload[2] === 80 && decryptedPayload[3] === 49;

                        if (hasMagic) {
                            const extLen = decryptedPayload[4];
                            const extBytes = decryptedPayload.slice(5, 5 + extLen);
                            const ext = new TextDecoder().decode(extBytes);
                            
                            resultBytes = decryptedPayload.slice(5 + extLen);
                            fileName = file.name.replace(/\.enc$/i, "") + ext;
                        } else {
                            // Legacy decryption fallback (files encrypted without metadata)
                            resultBytes = decryptedPayload;
                            fileName = file.name.replace(/\.enc$/i, "");
                            if (fileName === file.name) {
                                fileName = "decrypted_" + fileName;
                            }
                        }
                    }

                    // Display Output
                    outputContainer.classList.remove('hidden');

                    // Setup Download Link as a binary Blob
                    const blob = new Blob([resultBytes], { type: 'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    downloadBtn.href = url;
                    downloadBtn.download = fileName;

                    showToast(`File successfully ${mode}ed!`, false);
                } catch (error) {
                    showToast("Error processing file: " + error.message);
                }
            };
            
            reader.onerror = () => showToast("Error reading the file.");
            reader.readAsArrayBuffer(file);
        }

        encryptBtn.addEventListener('click', () => handleFileProcess('encrypt'));
        decryptBtn.addEventListener('click', () => handleFileProcess('decrypt'));
    </script>
