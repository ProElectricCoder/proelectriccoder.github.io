<!DOCTYPE html>
<html lang="en">
<head>
    <!-- “Created by Gemini 3.1 Pro” - ProElectricCoder -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEP Encryptor - ProElectricCoder</title>
    
    <link rel="icon" href="/Favicon.svg">
    <!-- meta properties -->
    <meta name="title" content="SEP Encryptor - ProElectricCoder">
    <meta name="description" content="Secure file encryption using a 1024-byte, base-256 stream key by ProElectricCoder">
    <meta name="author" content="ProElectricCoder"> <!-- Also known as Unknown9856 -->

    <meta property="og:title" content="SEP Encryptor - ProElectricCoder">
    <meta property="og:description" content="Secure file encryption using a 1024-byte, base-256 stream key.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://proelectriccoder.github.io/Projects/SEP/">
    <meta property="og:image" content="https://proelectriccoder.github.io/Preview.png">

    <!-- Global Header Resources -->
    <link rel="stylesheet" href="/header.css">
    <script src="https://proelectriccoder.gihub.io/header.js" defer></script>

    <!-- JSZip for handling zip archives -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for the textareas and file lists */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex items-center justify-center p-4 font-sans">
    <!-- Global Header Container -->
    <div id="header" class="fixed top-0 left-0 w-full z-50"></div>

    <div class="bg-gray-900/80 backdrop-blur-md p-8 rounded-2xl shadow-[0_0_30px_rgba(34,211,238,0.15)] w-full max-w-3xl border border-cyan-500/30 mt-16">
        <h1 class="text-3xl font-bold mb-2 text-cyan-400 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            SEP Encryptor
        </h1>
        <p class="text-gray-400 mb-8 text-sm">Secure multi-file encryption using a 1024-byte, base-256 stream key.</p>

        <!-- File Input Section -->
        <div class="mb-6">
            <label class="block text-sm font-semibold mb-2 text-cyan-200">1. Select Input File(s)</label>
            <input type="file" id="fileInput" multiple class="block w-full text-sm text-cyan-100 
                file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border file:border-cyan-400 
                file:text-sm file:font-semibold file:bg-cyan-900/30 file:text-cyan-400 
                hover:file:bg-cyan-400/20 hover:file:shadow-[0_0_15px_rgba(34,211,238,0.4)] file:transition-all cursor-pointer bg-gray-900/50 rounded-lg p-2 border border-cyan-500/30 transition-colors">
            
            <!-- Dynamic File Renaming List -->
            <div id="fileListContainer" class="hidden mt-4 bg-gray-900/40 p-3 rounded-lg border border-cyan-500/20">
                <label class="block text-xs font-semibold mb-2 text-cyan-400">Rename Files (Optional):</label>
                <div id="fileList" class="space-y-2 max-h-32 overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>
        </div>

        <!-- Key Management Section -->
        <div class="mb-6">
            <label class="block text-sm font-semibold mb-2 text-cyan-200">2. Encryption Key (.sep file) - Optional</label>
            <input type="file" id="keyFileInput" accept=".sep" class="block w-full text-sm text-cyan-100 
                file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border file:border-cyan-400 
                file:text-sm file:font-semibold file:bg-cyan-900/30 file:text-cyan-400 
                hover:file:bg-cyan-400/20 hover:file:shadow-[0_0_15px_rgba(34,211,238,0.4)] file:transition-all cursor-pointer bg-gray-900/50 rounded-lg p-2 border border-cyan-500/30 transition-colors mb-2">
            <div class="flex justify-between items-center mt-2">
                <span id="keyLengthStatus" class="text-xs text-gray-400">Current Key: Not loaded</span>
                <button id="genKeyBtn" class="text-sm border border-cyan-400 bg-cyan-900/30 text-cyan-400 hover:bg-cyan-400/20 hover:shadow-[0_0_15px_rgba(34,211,238,0.4)] px-4 py-2 rounded-lg transition-all shadow-sm font-medium">
                    Generate & Download Key
                </button>
            </div>
        </div>

        <!-- Password Section -->
        <div class="mb-6">
            <label class="block text-sm font-semibold mb-2 text-cyan-200">3. Encryption Password - Optional</label>
            <input type="password" id="passwordInput" placeholder="Enter secure password..." class="w-full bg-cyan-900/20 border border-cyan-500/30 rounded-lg px-3 py-2 text-sm text-cyan-100 focus:outline-none focus:border-cyan-400 transition-colors">
            <p class="text-xs text-cyan-500/80 mt-2">Note: Use a Key File, a Password, or both for maximum security.</p>
        </div>

        <!-- Settings Section -->
        <div class="mb-6 bg-gray-900/40 p-4 rounded-lg border border-cyan-500/30">
            <label class="block text-sm font-semibold mb-3 text-cyan-200">4. Processing Settings</label>
            <div class="flex flex-col gap-4">
                <div>
                    <span class="text-xs text-cyan-400 block mb-2">Encryption Mode:</span>
                    <div class="flex flex-col sm:flex-row gap-4 text-sm text-cyan-100">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="radio" name="encMode" value="bundle" checked class="accent-cyan-500 w-4 h-4"> 
                            <span class="group-hover:text-cyan-300 transition-colors">Bundle into one .enc</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="radio" name="encMode" value="individual" class="accent-cyan-500 w-4 h-4"> 
                            <span class="group-hover:text-cyan-300 transition-colors">Encrypt separately (ZIP output)</span>
                        </label>
                    </div>
                </div>
                <div>
                    <span class="text-xs text-cyan-400 block mb-1">Output Base Filename:</span>
                    <input type="text" id="outputFileName" value="output" class="w-full bg-cyan-900/20 border border-cyan-500/30 rounded-lg px-3 py-2 text-sm text-cyan-100 focus:outline-none focus:border-cyan-400 transition-colors">
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-4 mb-6">
            <button id="encryptBtn" class="flex-1 border-2 border-cyan-400 bg-cyan-900/30 text-cyan-400 hover:bg-cyan-400/20 hover:shadow-[0_0_20px_rgba(34,211,238,0.5)] font-bold py-3 px-4 rounded-xl transition-all transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed">
                Encrypt
            </button>
            <button id="decryptBtn" class="flex-1 border-2 border-cyan-400 bg-cyan-900/30 text-cyan-400 hover:bg-cyan-400/20 hover:shadow-[0_0_20px_rgba(34,211,238,0.5)] font-bold py-3 px-4 rounded-xl transition-all transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed">
                Decrypt
            </button>
        </div>

        <!-- Output Section -->
        <div id="outputContainer" class="hidden animate-fade-in">
            <a id="downloadBtn" class="block text-center w-full border-2 border-cyan-400 bg-cyan-900/30 text-cyan-400 hover:bg-cyan-400/20 hover:shadow-[0_0_20px_rgba(34,211,238,0.5)] font-bold py-3 px-4 rounded-xl transition-all cursor-pointer shadow-lg transform hover:-translate-y-0.5">
                Download Result
            </a>
        </div>
    </div>

    <!-- Message Modal/Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-xl transform transition-transform duration-300 translate-y-20 opacity-0 z-50">
        <span id="toastMessage">Error message</span>
    </div>

    <script type="module">
        import { cubicGradient } from 'https://proelectriccoder.github.io/ElectronCSS/CubicGradient.js';
        import { encryptFile, decryptFile } from 'https://proelectriccoder.gihub.io/Projects/SEP/sep-crypto.js';

        // Apply ProElectricCoder's signature cubic gradient to the background
        document.body.style.background = cubicGradient({
            direction: 'to bottom right',
            start: '#050510', 
            end: '#003344',   
            steps: 20,
            power: 3
        });

        // Security Warning (Self-XSS Prevention)
        console.log("%cSTOP!", "color: #ef4444; font-family: sans-serif; font-size: 4rem; font-weight: bold; text-shadow: 2px 2px 0px #000;");
        console.log("%cThis is a browser feature intended for developers.\nIf someone told you to copy and paste something here, it is a scam and will give them access to steal your 1024-byte SEP encryption key and decrypted files!", "color: #f3f4f6; font-family: sans-serif; font-size: 1.25rem; font-weight: bold; background: #1f2937; padding: 10px; border-radius: 5px;");

        // DOM Elements
        const fileInput = document.getElementById('fileInput');
        const keyFileInput = document.getElementById('keyFileInput');
        const keyLengthStatus = document.getElementById('keyLengthStatus');
        const genKeyBtn = document.getElementById('genKeyBtn');
        const passwordInput = document.getElementById('passwordInput');
        const encryptBtn = document.getElementById('encryptBtn');
        const decryptBtn = document.getElementById('decryptBtn');
        const outputContainer = document.getElementById('outputContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const fileListContainer = document.getElementById('fileListContainer');
        const fileList = document.getElementById('fileList');

        // Constants
        const REQUIRED_KEY_LENGTH = 1024;

        // State
        let currentKeyBytes = null;
        let selectedFiles = [];

        // Utilities
        function showToast(message, isError = true) {
            toastMessage.textContent = message;
            toast.className = `fixed bottom-4 right-4 text-white px-6 py-3 rounded-lg shadow-xl transform transition-all duration-300 z-50 ${isError ? 'bg-red-500' : 'bg-green-500'}`;
            toast.style.transform = 'translateY(0)';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.transform = 'translateY(20px)';
                toast.style.opacity = '0';
            }, 3000);
        }

        async function readFileAsUint8Array(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(new Uint8Array(e.target.result));
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        // Key encoding/decoding: Packs 2 bytes into 1 UTF-16 character
        function generateUTF16KeyBlob(bytes) {
            const buffer = new ArrayBuffer(bytes.length + 2);
            const view = new DataView(buffer);
            view.setUint16(0, 0xFEFF, true);
            for (let i = 0; i < bytes.length; i += 2) {
                const charCode = (bytes[i] << 8) | (bytes[i + 1] || 0);
                view.setUint16(2 + i, charCode, true);
            }
            return new Blob([buffer], { type: 'text/plain;charset=UTF-16LE' });
        }

        function parseUTF16KeyBuffer(buffer) {
            const view = new DataView(buffer);
            let startIndex = 0;
            if (buffer.byteLength >= 2 && view.getUint16(0, true) === 0xFEFF) {
                startIndex = 2;
            }
            const bytes = new Uint8Array(REQUIRED_KEY_LENGTH);
            let byteIdx = 0;
            for (let i = startIndex; i < buffer.byteLength && byteIdx < REQUIRED_KEY_LENGTH; i += 2) {
                const charCode = view.getUint16(i, true);
                bytes[byteIdx++] = (charCode >> 8) & 0xFF;
                bytes[byteIdx++] = charCode & 0xFF;
            }
            return bytes;
        }

        function updateKeyStatus(bytes) {
            currentKeyBytes = bytes;
            if (!bytes) {
                keyLengthStatus.textContent = "Current Key: Not loaded";
                keyLengthStatus.className = "text-xs text-gray-500";
            } else if (bytes.length !== REQUIRED_KEY_LENGTH) {
                keyLengthStatus.textContent = `Invalid Key: ${bytes.length} bytes`;
                keyLengthStatus.className = "text-xs text-red-400";
            } else {
                keyLengthStatus.textContent = `Current Key: Loaded (1024 bytes)`;
                keyLengthStatus.className = "text-xs text-green-400";
            }
        }

        // Event Listeners for Key
        if (keyFileInput) {
            keyFileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return updateKeyStatus(null);
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const bytes = parseUTF16KeyBuffer(event.target.result);
                        updateKeyStatus(bytes);
                    } catch (err) {
                        showToast("Failed to parse key file.");
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        if (genKeyBtn) {
            genKeyBtn.addEventListener('click', () => {
                const keyBytes = new Uint8Array(REQUIRED_KEY_LENGTH);
                crypto.getRandomValues(keyBytes);
                updateKeyStatus(keyBytes);
                const blob = generateUTF16KeyBlob(keyBytes);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'key.sep';
                a.click();
                URL.revokeObjectURL(url);
                showToast("1024-byte key packed to UTF-16 and downloaded.", false);
            });
        }

        // Event Listener for Multiple Files
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            fileList.innerHTML = '';
            selectedFiles = [];

            if (files.length === 0) {
                fileListContainer.classList.add('hidden');
                document.getElementById('outputFileName').value = "output";
                return;
            }

            // Set a default output name based on the first file or "bundle"
            if (files.length === 1) {
                const fName = files[0].name;
                const lastDot = fName.lastIndexOf('.');
                document.getElementById('outputFileName').value = lastDot !== -1 ? fName.substring(0, lastDot) : fName;
            } else {
                document.getElementById('outputFileName').value = "encrypted_bundle";
            }

            fileListContainer.classList.remove('hidden');
            files.forEach((file, index) => {
                const lastDot = file.name.lastIndexOf('.');
                const baseName = lastDot !== -1 && lastDot !== 0 ? file.name.substring(0, lastDot) : file.name;
                const ext = lastDot !== -1 && lastDot !== 0 ? file.name.substring(lastDot) : '';
                
                const id = `file_${index}`;
                selectedFiles.push({ file, id, ext });

                const item = document.createElement('div');
                item.className = 'flex items-center gap-2 text-sm';
                item.innerHTML = `
                    <span class="text-gray-400 w-4 text-right">${index + 1}.</span>
                    <input type="text" id="input_${id}" value="${baseName}" class="flex-1 bg-cyan-900/20 border border-cyan-500/30 rounded px-2 py-1 text-cyan-100 focus:outline-none focus:border-cyan-400 transition-colors">
                    <span class="text-gray-500 w-12 truncate">${ext}</span>
                `;
                fileList.appendChild(item);
            });
        });

        // Provide Download Function
        function triggerDownload(data, filename, type = 'application/octet-stream') {
            const blob = data instanceof Blob ? data : new Blob([data], { type });
            const url = URL.createObjectURL(blob);
            downloadBtn.href = url;
            downloadBtn.download = filename;
            outputContainer.classList.remove('hidden');
        }

        // Handle Encryption
        encryptBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return showToast("Select input file(s) first.");
            
            let keyString = "";
            if (currentKeyBytes) {
                for (let i = 0; i < currentKeyBytes.length; i++) keyString += String.fromCharCode(currentKeyBytes[i]);
                keyString = btoa(keyString);
            }
            
            const password = passwordInput.value;
            const finalPassword = password + keyString;
            
            if (!finalPassword) return showToast("Provide a password, a key file, or both.");
            
            showToast("Processing encryption...", false);
            encryptBtn.disabled = true;

            try {
                const mode = document.querySelector('input[name="encMode"]:checked').value;
                const outName = document.getElementById('outputFileName').value || 'output';

                if (mode === 'bundle') {
                    // Create one ZIP of all files, then encrypt that ZIP as a single .enc file
                    const zip = new JSZip();
                    for (const item of selectedFiles) {
                        const newName = document.getElementById(`input_${item.id}`).value + item.ext;
                        const data = await readFileAsUint8Array(item.file);
                        zip.file(newName, data);
                    }
                    const zipBytes = await zip.generateAsync({type: "uint8array"});
                    const resultBytes = await encryptFile(zipBytes, ".zip", finalPassword);
                    triggerDownload(resultBytes, `${outName}.enc`);
                } else {
                    // Encrypt each file individually, then group them into an unencrypted ZIP
                    const zip = new JSZip();
                    for (const item of selectedFiles) {
                        const newBaseName = document.getElementById(`input_${item.id}`).value;
                        const data = await readFileAsUint8Array(item.file);
                        const resultBytes = await encryptFile(data, item.ext, finalPassword);
                        zip.file(`${newBaseName}.enc`, resultBytes);
                    }
                    const zipBlob = await zip.generateAsync({type: "blob"});
                    triggerDownload(zipBlob, `${outName}.zip`);
                }
                showToast("Files encrypted successfully!", false);
            } catch (error) {
                showToast("Encryption error: " + error.message);
            } finally {
                encryptBtn.disabled = false;
            }
        });

        // Handle Decryption
        decryptBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return showToast("Select input file(s) first.");
            
            let keyString = "";
            if (currentKeyBytes) {
                for (let i = 0; i < currentKeyBytes.length; i++) keyString += String.fromCharCode(currentKeyBytes[i]);
                keyString = btoa(keyString);
            }
            
            const password = passwordInput.value;
            const finalPassword = password + keyString;
            
            if (!finalPassword) return showToast("Provide a password, a key file, or both.");
            
            showToast("Processing decryption...", false);
            decryptBtn.disabled = true;

            try {
                const decryptedFiles = [];
                const outName = document.getElementById('outputFileName').value || 'decrypted_output';

                for (const item of selectedFiles) {
                    const currentFileName = item.file.name;
                    const data = await readFileAsUint8Array(item.file);

                    // Check if it's an unencrypted zip (likely containing .enc files from 'individual' mode)
                    if (currentFileName.endsWith('.zip')) {
                        const zip = await JSZip.loadAsync(data);
                        const relativePaths = Object.keys(zip.files);
                        
                        for (const relativePath of relativePaths) {
                            const zipEntry = zip.files[relativePath];
                            if (zipEntry.dir) continue;
                            
                            const entryData = await zipEntry.async("uint8array");
                            if (relativePath.endsWith('.enc')) {
                                const unpacked = await decryptFile(entryData, password);
                                const baseName = relativePath.replace(/\.enc$/i, "");
                                decryptedFiles.push({ name: baseName + unpacked.ext, data: unpacked.data });
                            } else {
                                // Ignore or pass through non-enc files within a zip
                                decryptedFiles.push({ name: relativePath, data: entryData });
                            }
                        }
                    } else if (currentFileName.endsWith('.enc')) {
                        // Standard single encrypted file or bundled encrypted zip
                        const unpacked = await decryptFile(data, finalPassword);
                        
                        const customBaseName = document.getElementById(`input_${item.id}`).value;
                        let finalName = customBaseName;
                        if (finalName.endsWith('.enc')) finalName = finalName.replace(/\.enc$/i, "");
                        
                        decryptedFiles.push({ name: finalName + unpacked.ext, data: unpacked.data });
                    }
                }

                if (decryptedFiles.length === 0) {
                    throw new Error("No valid .enc files found to decrypt.");
                } else if (decryptedFiles.length === 1) {
                    // Download directly as a single file (If it was a bundled .enc, the extension unpacked will be .zip, restoring it natively!)
                    triggerDownload(decryptedFiles[0].data, decryptedFiles[0].name);
                } else {
                    // If multiple files were decrypted, package them into a new zip
                    const zip = new JSZip();
                    decryptedFiles.forEach(f => zip.file(f.name, f.data));
                    const zipBlob = await zip.generateAsync({type: "blob"});
                    triggerDownload(zipBlob, `${outName}.zip`);
                }
                showToast("Files decrypted successfully!", false);
            } catch (error) {
                showToast("Decryption error: " + error.message);
            } finally {
                decryptBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
