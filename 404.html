<!DOCTYPE html>
<html>
<head>
	<title>404 Page Not Found - ProElectricCoder</title>
	<style>
		body {
			margin: 0;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
		}
		.content-layout {
			display: flex;
			align-items: center;
			gap: 40px;
		}
		.error-code {
			font-family: fantasy;
			font-size: 7em;
			margin: 0;
			color: #ffffff;
			letter-spacing: 2px;
			line-height: 1;
			text-shadow: 0 0 15px rgba(88, 166, 255, 0.15);
		}
		h2 {
			font-family: monospace;
			color: cyan;
			font-size: 1.8em;
			margin-top: 10px;
			margin-bottom: 0;
		}
		@keyframes logoGlow {
			0% { box-shadow: 0 0 10px cyan; }
			50% { box-shadow: 0 0 25px cyan; }
			100% { box-shadow: 0 0 10px cyan; }
		}
		#logo {
			animation: logoGlow 5s ease-in-out infinite;
			border-radius: 50%;
			width: 150px;
			padding: 1.5px;
		}
		.back-link {
			position: absolute;
			top: 25px;
			left: 30px;
			color: cyan;
			text-decoration: none;
			font-family: monospace;
			font-size: 1.2em;
			transition: all 0.3s ease;
		}
		.back-link:hover {
			color: #ffffff;
			text-shadow: 0 0 10px cyan;
		}
	</style>
</head>
<body>
	<a href=".." class="back-link">← Back</a>
	<div class="content-layout">
		<img src="/Favicon.svg" id="logo">
		<main>
			<div class="error-code">404</div>
			<h2>Page Not Found</h2>
		</main>
	</div>
	<script type="module">
		import { cubicGradient } from 'https://proelectriccoder.github.io/ElectronCSS/CubicGradient.js';
		document.body.style.background = cubicGradient({
			direction: 'to bottom right',
			start: '#0d1117',
			end: '#003333',
			steps: 30,
			power: 3
		});
	</script>
</body>
</html>
