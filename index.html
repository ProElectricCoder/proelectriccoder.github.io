<!DOCTYPE html>
<html>
	<head>
		<title>
			ProElectricCoder
		</title>
		<link rel="icon" href="Favicon.svg">
		<meta property="og:image" content="https://proelectriccoder.github.io/Favicon.svg">
		<style>
			body {
				background: linear-gradient(90deg, #000055 0%, #000055 20%, #000033 40%, #000000 100%);
			}
			@keyframes breathingGlow {
				0% {
					box-shadow: 0 0 10px cyan;
				}
				50% {
					box-shadow: 0 0 30px cyan;
				}
				100% {
					box-shadow: 0 0 10px cyan;
				}
			}
			img {
				animation: breathingGlow 2s ease-in-out infinite;
			}
		</style>
	</head>
	<body>
		<img src="Favicon.svg" width="512" height="512" />
		<p>ProElectricCoder</p>
	</body>
</html>
