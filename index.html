<!DOCTYPE html>
<html>
	<head>
		<title>
			ProElectricCoder
		</title>
		<link rel="icon" href="Favicon.svg">
		<meta property="og:image" content="https://proelectriccoder.github.io/Favicon.svg">
		<style>
			body {
				background: linear-gradient(90deg, #000055 0%, #000055 20%, #000033 40%, #000000 100%);
			}
			@keyframes breathingGlow {
				0% {
					box-shadow: 0 0 30px cyan;
				}
				50% {
					box-shadow: 0 0 50px cyan;
				}
				100% {
					box-shadow: 0 0 30px cyan;
				}
			}
			#logo {
				animation: breathingGlow 5s ease-in-out infinite;
				border-radius: 50%;
				padding: 5px;
			}
			.normal {
				font-family: monospace;
				color: #0ff;
				font-size: 15px;
			}
			#name {
				font-family: fantasy;
				color: #fff;
				font-size: 50px;
			}
			.container {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100vh;
				gap: 40px;
			}

			.text {
				display: flex;
				flex-direction: column;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<img id="logo" src="Favicon.svg" width="512" height="512" />
			<div class="text">
				<span class="normal">
					Welcome to - 
				</span>
				<br />
				<span id="name">
					ProElectricCoder
				</span>
				<br />
				<span class="normal">
					A Scratcher, Scratch Wikian and a Git user
				</span>
			</div>
		</div>
	</body>
</html>
