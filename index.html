<!DOCTYPE html>
<html>
	<head>
		<title>
			ProElectricCoder
		</title>
		<link rel="icon" href="Favicon.svg">
		<meta property="og:image" content="https://proelectriccoder.github.io/Favicon.svg">
		<style>
			body {
				margin: 0;
				background: linear-gradient(90deg, #000055 0%, #000055 20%, #000033 40%, #000000 100%);
			}
			@keyframes breathingGlow {
				0% {
					box-shadow: 0 0 30px cyan;
				}
				50% {
					box-shadow: 0 0 50px cyan;
				}
				100% {
					box-shadow: 0 0 30px cyan;
				}
			}
			#logo {
				animation: breathingGlow 5s ease-in-out infinite;
				border-radius: 50%;
				padding: 5px;
				width: 512px;
				height: 512px;
			}
			.normal {
				font-family: monospace;
				color: #0ff;
				font-size: 15px;
			}
			#name {
				font-family: fantasy;
				color: #fff;
				font-size: 50px;
			}
			.container {
				display: flex;
				align-items: center;
				gap: 40px;
				margin-left: 80px;
				height: 100vh;
			}

			.text {
				flex: 1;
				display: flex;
				flex-direction: column;
				justify-content: center;  
				align-items: flex-start;  
				padding-left: 80px;
			}
			.right {
				flex: 1;
				display: flex;
				justify-content: center; 
				align-items: center; 
				aspect-ratio: 1/1;
				max-width: 512px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="text">
				<span class="normal">
					Welcome to - 
				</span>
				<br />
				<span id="name">
					ProElectricCoder
				</span>
				<br />
				<span class="normal">
					A Scratcher, Scratch Wikian and a Programmer
				</span>
			</div>
			<img class="right" id="logo" src="Favicon.svg" />
		</div>
	</body>
</html>
